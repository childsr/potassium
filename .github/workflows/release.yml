name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: write # Needed to create git tags and releases
  issues: write   # Needed for semantic-release comments on issues
  pull-requests: write # Needed for semantic-release comments on PRs
  id-token: write # Needed if you use npm provenance (recommended)

jobs:
  release:
    name: Build, Test, and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false # Essential for semantic-release to push tags safely

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Run Tests
        run: npm test # Ensures broken code never gets published

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release